<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Onliest — AI-powered fashion platform for custom sarees and Indian wear. Design, customize, and order unique sarees online." />
  <title>Onliest</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    #root-loading {
      position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#0B0B0F 0%,#0f0a0c 35%,#1A0612 100%);
    }
    #root-loading .loader {
      font-size:48px;
      display:inline-block;
      font-family:Montserrat,Arial,Helvetica,sans-serif;
      font-weight:bold;
      color:#FFF;
      letter-spacing:2px;
      position:relative;
      box-sizing:border-box;
    }
    #root-loading .loader::after {
      content:'Loading';
      position:absolute;
      left:0;
      top:0;
      color:#263238;
      text-shadow:0 0 2px #FFF,0 0 1px #FFF,0 0 1px #FFF;
      width:100%;
      height:100%;
      overflow:hidden;
      box-sizing:border-box;
      animation:animloader 6s linear infinite;
    }
    @keyframes animloader {
      0% { height:100%; }
      100% { height:0%; }
    }
    #root-loading .rex-load-error-msg {
      display:none;
      color:#ff6b6b;
      font-family:Inter,system-ui,sans-serif;
      font-size:1rem;
    }
    #root-loading.rex-load-error .loader { display:none; }
    #root-loading.rex-load-error .rex-load-error-msg { display:block; }
  </style>
</head>
<body class="rex-body" style="color:#F4F4F4;margin:0;">
  <div id="root" style="min-height:100vh;width:100%;position:relative;display:block;">
    <div id="root-loading" aria-live="polite" aria-busy="true">
      <span class="loader">Loading</span>
      <span class="rex-load-error-msg">App failed to load. Check console (F12) for errors.</span>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    setTimeout(function(){
      var r=document.getElementById('root');
      var loading=document.getElementById('root-loading');
      if(r&&loading&&!r.querySelector('.rex-chrome')){
        loading.classList.add('rex-load-error');
      }
    },3000);
  </script>
</body>
</html>
